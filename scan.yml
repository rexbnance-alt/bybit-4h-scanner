name: Bybit 4H Scanner

on:
  schedule:
    # Run ~2 minutes after each 15m candle close so the candle is finalized.
    # Note: GitHub Actions cron is best-effort; runs may be delayed 5-15 min
    # during peak load. That's fine — dedup ensures no double-alerts.
    - cron: '2,17,32,47 * * * *'
  workflow_dispatch:  # manual trigger

concurrency:
  group: bybit-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore state cache
        id: state-cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          # Unique key per run; restore from any prior bybit-state-* entry
          key: bybit-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bybit-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOP_N: '100'
          MIN_CONFIDENCE: '70'
          LTF_INTERVAL: '15'        # set to '5' for 5m confirmation
          SEND_SUMMARY: 'false'     # no spammy "NO TRADE" pings every 15m
        run: python main.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: bybit-state-${{ github.run_id }}-${{ github.run_attempt }}
